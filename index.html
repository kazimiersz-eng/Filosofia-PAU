<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla comparativa · Historia de la Filosofía PAU</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --antigua: #CCC5F0; --medieval: #9FD9C0; --moderna: #F5C97A; --contemp: #F0A0A0;
  --eje-bg: #1a1a1a; --border: #CCCCCC; --page-bg: #F7F5F0;
}

body { font-family: 'Source Sans 3', sans-serif; background: var(--page-bg); margin: 0; }
header { padding: 1.5rem 2rem; background: #fff; border-bottom: 1px solid var(--border); }
header h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 1.4rem; color: #333; }

/* Controles */
.controls { padding: 1rem 2rem; background: #fff; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.group-label { font-weight: 600; font-size: 0.85rem; margin-right: 8px; color: #666; }
.btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
.btn.active { background: #444; color: #fff; border-color: #000; }
.btn-action { background: #f0f0f0; font-weight: 600; }
.btn-action:hover { background: #e0e0e0; }

/* Tabla */
.table-wrap { padding: 1.5rem; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-width: 1000px; }
th, td { border: 1px solid var(--border); padding: 12px; font-size: 0.85rem; line-height: 1.4; }

/* Cabeceras */
thead th { background: #fdfdfd; font-weight: 600; text-align: center; }
.th-epoca { font-size: 0.75rem; letter-spacing: 0.1em; color: #666; }
.th-antigua { background: var(--antigua) !important; }
.th-medieval { background: var(--medieval) !important; }
.th-moderna { background: var(--moderna) !important; }
.th-contemp { background: var(--contemp) !important; }

/* Filas de Eje (Conceptos) */
.row-eje td { background: var(--eje-bg); color: #fff; font-weight: 600; cursor: pointer; border: none; padding: 14px 12px; }
.row-eje:hover { filter: brightness(1.3); }
.toggle-icon { display: inline-block; width: 20px; font-family: monospace; }

.td-concepto { background: #f9f9f7; font-weight: 600; width: 180px; }
.row-principio td { background: #f0f0f0; font-weight: 700; border-top: 2px solid #333; }
.na-cell { color: #bbb; font-style: italic; text-align: center; }

#loading { padding: 2rem; text-align: center; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Tabla comparativa · Historia de la Filosofía</h1>
</header>

<div class="controls">
  <span class="group-label">AUTORES:</span>
  <button class="btn active" data-auth="PLATÓN" onclick="toggleAutor('PLATÓN', this)">Platón</button>
  <button class="btn active" data-auth="TOMÁS DE AQUINO" onclick="toggleAutor('TOMÁS DE AQUINO', this)">T. Aquino</button>
  <button class="btn active" data-auth="DESCARTES" onclick="toggleAutor('DESCARTES', this)">Descartes</button>
  <button class="btn active" data-auth="LOCKE" onclick="toggleAutor('LOCKE', this)">Locke</button>
  <button class="btn active" data-auth="MARX" onclick="toggleAutor('MARX', this)">Marx</button>
  <button class="btn active" data-auth="ARENDT" onclick="toggleAutor('ARENDT', this)">Arendt</button>
  
  <span class="group-label" style="margin-left:15px">BLOQUES:</span>
  <button class="btn btn-action" onclick="expandAll()">Expandir todo</button>
  <button class="btn btn-action" onclick="collapseAll()">Plegar todo</button>
</div>

<div class="table-wrap">
  <div id="loading">Conectando con Google Sheets...</div>
  <table id="tabla" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const SHEET_ID = '1XK6qxbjGrQYjW8nvlmxONOSekHCz38Y6MEHmbD_m5JU';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Tabla%20comparativa`;

const AUTORES = [
  { name: 'PLATÓN', epoca: 'antigua', cls: 'th-antigua' },
  { name: 'TOMÁS DE AQUINO', epoca: 'medieval', cls: 'th-medieval' },
  { name: 'DESCARTES', epoca: 'moderna', cls: 'th-moderna' },
  { name: 'LOCKE', epoca: 'moderna', cls: 'th-moderna' },
  { name: 'MARX', epoca: 'contemp', cls: 'th-contemp' },
  { name: 'ARENDT', epoca: 'contemp', cls: 'th-contemp' }
];

let visibleAutores = new Set(AUTORES.map(a => a.name));
let ejeGroups = {}; // Almacena las filas hijas de cada eje

function parseGviz(raw) {
  const json = JSON.parse(raw.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
  return json.table.rows;
}

function detectType(cells) {
  const first = (cells[0] || '').trim();
  if (!first) return 'empty';
  const restEmpty = cells.slice(1).every(c => !c || c.trim() === '' || c === 'null');
  // Es un EJE si empieza por Letra (A, B, C...) o ★ y lo demás está vacío
  if (restEmpty && (first.match(/^[A-Z]/i) || first.startsWith('★'))) return 'eje';
  if (first.startsWith('★')) return 'principio';
  return 'data';
}

function buildTable(rows) {
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  // 1. CONSTRUIR CABECERA
  let h1 = '<tr><th rowspan="2">EJE / CONCEPTO</th>';
  h1 += `<th colspan="1" class="th-epoca th-antigua" data-ep="antigua">ANTIGUA</th>
         <th colspan="1" class="th-epoca th-medieval" data-ep="medieval">MEDIEVAL</th>
         <th colspan="2" class="th-epoca th-moderna" data-ep="moderna">MODERNA</th>
         <th colspan="2" class="th-epoca th-contemp" data-ep="contemp">CONTEMPORÁNEA</th></tr>`;
  
  let h2 = '<tr>';
  AUTORES.forEach(a => {
    h2 += `<th data-auth="${a.name}" class="${a.cls}">${a.name}</th>`;
  });
  h2 += '</tr>';
  thead.innerHTML = h1 + h2;

  // 2. CONSTRUIR CUERPO
  let currentEjeId = null;
  let ejeCounter = 0;

  rows.forEach(r => {
    const cells = r.c ? r.c.map(v => v ? String(v.v) : '') : [];
    const type = detectType(cells);
    if (type === 'empty') return;

    const tr = document.createElement('tr');

    if (type === 'eje') {
      ejeCounter++;
      currentEjeId = 'eje-' + ejeCounter;
      ejeGroups[currentEjeId] = []; // Inicializar grupo de filas
      
      tr.className = 'row-eje';
      tr.id = currentEjeId;
      tr.dataset.expanded = "true";
      tr.innerHTML = `<td colspan="7"><span class="toggle-icon">▼</span> ${cells[0]}</td>`;
      tr.onclick = () => toggleEje(currentEjeId);
      tbody.appendChild(tr);
    } else {
      tr.className = type === 'principio' ? 'row-principio' : 'row-data';
      let html = `<td class="td-concepto">${cells[0] || ''}</td>`;
      AUTORES.forEach((a, idx) => {
        const val = cells[idx + 1] || '—';
        const isNA = val === '—' || val === 'null' || val === '';
        html += `<td data-auth="${a.name}" class="${isNA ? 'na-cell' : ''}">${isNA ? '—' : val}</td>`;
      });
      tr.innerHTML = html;
      tbody.appendChild(tr);
      
      // Registrar esta fila como hija del eje actual
      if (currentEjeId) ejeGroups[currentEjeId].push(tr);
    }
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('tabla').style.display = 'table';
}

// Lógica de Plegado de Ejes
function toggleEje(id) {
  const mainRow = document.getElementById(id);
  const isExpanded = mainRow.dataset.expanded === "true";
  const newState = !isExpanded;
  
  mainRow.dataset.expanded = newState;
  mainRow.querySelector('.toggle-icon').textContent = newState ? '▼' : '▶';
  
  ejeGroups[id].forEach(row => {
    row.style.display = newState ? '' : 'none';
  });
}

function expandAll() {
  Object.keys(ejeGroups).forEach(id => {
    const row = document.getElementById(id);
    if (row.dataset.expanded === "false") toggleEje(id);
  });
}

function collapseAll() {
  Object.keys(ejeGroups).forEach(id => {
    const row = document.getElementById(id);
    if (row.dataset.expanded === "true") toggleEje(id);
  });
}

// Lógica de Visibilidad de Autores
function toggleAutor(name, btn) {
  if (visibleAutores.has(name)) {
    if (visibleAutores.size === 1) return;
    visibleAutores.delete(name);
    btn.classList.remove('active');
  } else {
    visibleAutores.add(name);
    btn.classList.add('active');
  }
  applyVisibility();
}

function applyVisibility() {
  // 1. Ocultar/Mostrar columnas de autores
  AUTORES.forEach(a => {
    const show = visibleAutores.has(a.name);
    document.querySelectorAll(`[data-auth="${a.name}"]`).forEach(el => {
      el.style.display = show ? '' : 'none';
    });
  });

  // 2. Ajustar colspans de Épocas (Cabecera fila 1)
  const epocas = ['antigua', 'medieval', 'moderna', 'contemp'];
  epocas.forEach(ep => {
    const count = AUTORES.filter(a => a.epoca === ep && visibleAutores.has(a.name)).length;
    const th = document.querySelector(`.th-epoca[data-ep="${ep}"]`);
    if (count === 0) {
      th.style.display = 'none';
    } else {
      th.style.display = '';
      th.colSpan = count;
    }
  });

  // 3. Ajustar colspan de filas de Eje (las negras)
  const totalVisible = 1 + visibleAutores.size; // Concepto + Autores activos
  document.querySelectorAll('.row-eje td').forEach(td => {
    td.colSpan = totalVisible;
  });
}

fetch(URL).then(r => r.text()).then(raw => buildTable(parseGviz(raw)));
</script>

</body>
</html>
