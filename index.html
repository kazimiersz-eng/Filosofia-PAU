<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla comparativa · Historia de la Filosofía</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --antigua: #CCC5F0; --medieval: #9FD9C0; --moderna: #F5C97A; --contemp: #F0A0A0;
  --eje-bg: #1a1a1a; --border: #CCCCCC; --page-bg: #F7F5F0;
}

body { font-family: 'Source Sans 3', sans-serif; background: var(--page-bg); margin: 0; }
header { padding: 1.5rem 2rem; background: #fff; border-bottom: 1px solid var(--border); }
header h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 1.4rem; color: #333; }

/* Controles */
.controls { padding: 1rem 2rem; background: #fff; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; position: sticky; top: 0; z-index: 100; }
.group-label { font-weight: 600; font-size: 0.85rem; margin-right: 8px; color: #666; }
.btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-weight: 400; }
.btn.active { background: #444; color: #fff; border-color: #000; font-weight: 600; }
.btn-action { background: #f0f0f0; font-weight: 600; border: 1px solid #bbb; }
.btn-action:hover { background: #ddd; }

/* Tabla */
.table-wrap { padding: 1.5rem; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-width: 1000px; }
th, td { border: 1px solid var(--border); padding: 12px; font-size: 0.85rem; line-height: 1.4; }

/* Cabeceras */
thead th { background: #fdfdfd; font-weight: 600; text-align: center; }
.th-epoca { font-size: 0.75rem; letter-spacing: 0.1em; color: #666; }

/* Filas de Eje (Las de las LETRAS) */
.row-eje td { background: var(--eje-bg) !important; color: #fff !important; font-weight: 600; cursor: pointer; padding: 14px 12px; border-bottom: 2px solid #000; text-transform: uppercase; letter-spacing: 1px; }
.row-eje:hover { background: #333 !important; }
.toggle-icon { display: inline-block; width: 25px; font-family: monospace; font-size: 1.1rem; color: #aaa; }

.td-concepto { background: #f9f9f7; font-weight: 600; width: 200px; }
.row-principio td { background: #f2f2f0; font-weight: 700; border-top: 2px solid #444; }
.na-cell { color: #bbb; font-style: italic; text-align: center; }

#loading { padding: 2rem; text-align: center; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Tabla comparativa · Historia de la Filosofía</h1>
</header>

<div class="controls">
  <span class="group-label">VER AUTORES:</span>
  <button class="btn active" onclick="toggleAutor('PLATÓN', this)">Platón</button>
  <button class="btn active" onclick="toggleAutor('TOMÁS DE AQUINO', this)">T. Aquino</button>
  <button class="btn active" onclick="toggleAutor('DESCARTES', this)">Descartes</button>
  <button class="btn active" onclick="toggleAutor('LOCKE', this)">Locke</button>
  <button class="btn active" onclick="toggleAutor('MARX', this)">Marx</button>
  <button class="btn active" onclick="toggleAutor('ARENDT', this)">Arendt</button>
  
  <span class="group-label" style="margin-left:15px">BLOQUES:</span>
  <button class="btn btn-action" onclick="expandAll()">Expandir todo</button>
  <button class="btn btn-action" onclick="collapseAll()">Plegar todo</button>
</div>

<div class="table-wrap">
  <div id="loading">Cargando datos desde la nube...</div>
  <table id="tabla" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const SHEET_ID = '1XK6qxbjGrQYjW8nvlmxONOSekHCz38Y6MEHmbD_m5JU';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Tabla%20comparativa`;

const AUTORES = [
  { name: 'PLATÓN', epoca: 'antigua' },
  { name: 'TOMÁS DE AQUINO', epoca: 'medieval' },
  { name: 'DESCARTES', epoca: 'moderna' },
  { name: 'LOCKE', epoca: 'moderna' },
  { name: 'MARX', epoca: 'contemp' },
  { name: 'ARENDT', epoca: 'contemp' }
];

let autoresVisibles = new Set(AUTORES.map(a => a.name));
let bloques = {}; 

function detectType(cells) {
  const first = (cells[0] || '').trim();
  if (!first) return 'empty';
  
  // 1. Consideramos "vacío" no solo a la falta de texto, sino también a celdas que 
  // tengan guiones, rayas o el texto "null" que inyecta a veces Google.
  const restEmpty = cells.slice(1).every(c => {
    if (!c) return true;
    const text = c.trim();
    return text === '' || text === 'null' || text === '-' || text === '—';
  });

  // 2. Si la celda empieza por una Estrella
  if (first.startsWith('★')) return 'principio';

  // 3. Patrones evidentes de sección. Ej: "A - Algo", "B. Algo", "C) Algo", o solo "A"
  const formatoLetraEvidente = /^[A-Z]\s*[\-\.\)]/i.test(first) || first.length === 1;

  // Si tiene el formato evidente de Letra, o si el resto de columnas de autores 
  // están "vacías" y el texto empieza por una letra mayúscula, es un bloque desplegable.
  if (formatoLetraEvidente || (restEmpty && /^[A-Z]/i.test(first))) {
    return 'eje';
  }

  return 'data';
}

function buildTable(data) {
  const rows = data.table.rows;
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  let h1 = '<tr><th rowspan="2">EJE / CONCEPTO</th>';
  h1 += `<th colspan="1" class="th-epoca" data-ep="antigua" style="background:var(--antigua)">ANTIGUA</th>
         <th colspan="1" class="th-epoca" data-ep="medieval" style="background:var(--medieval)">MEDIEVAL</th>
         <th colspan="2" class="th-epoca" data-ep="moderna" style="background:var(--moderna)">MODERNA</th>
         <th colspan="2" class="th-epoca" data-ep="contemp" style="background:var(--contemp)">CONTEMPORÁNEA</th></tr>`;
  let h2 = '<tr>';
  AUTORES.forEach(a => { h2 += `<th data-auth="${a.name}">${a.name}</th>`; });
  h2 += '</tr>';
  thead.innerHTML = h1 + h2;

  let currentEjeId = null;
  let counter = 0;

  rows.forEach(r => {
    const cells = r.c ? r.c.map(v => v ? String(v.v) : '') : [];
    const type = detectType(cells);
    if (type === 'empty') return;

    const tr = document.createElement('tr');

    if (type === 'eje') {
      counter++;
      currentEjeId = 'bloque-' + counter;
      bloques[currentEjeId] = { main: tr, children: [], expanded: true };
      
      tr.className = 'row-eje';
      tr.innerHTML = `<td colspan="${AUTORES.length + 1}"><span class="toggle-icon">▼</span> ${cells[0]}</td>`;
      tr.onclick = () => toggleEje(currentEjeId);
      tbody.appendChild(tr);
    } else {
      tr.className = type === 'principio' ? 'row-principio' : 'row-data';
      let html = `<td class="td-concepto">${cells[0]}</td>`;
      AUTORES.forEach((a, idx) => {
        const val = cells[idx + 1] || '—';
        const isNA = val === '—' || val === 'null' || val === '';
        html += `<td data-auth="${a.name}" class="${isNA ? 'na-cell' : ''}">${isNA ? '—' : val}</td>`;
      });
      tr.innerHTML = html;
      tbody.appendChild(tr);
      if (currentEjeId) bloques[currentEjeId].children.push(tr);
    }
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('tabla').style.display = 'table';
}

function toggleEje(id) {
  const b = bloques[id];
  b.expanded = !b.expanded;
  b.main.querySelector('.toggle-icon').textContent = b.expanded ? '▼' : '▶';
  b.children.forEach(row => {
    row.style.display = b.expanded ? '' : 'none';
  });
}

function expandAll() {
  for (let id in bloques) {
    if (!bloques[id].expanded) toggleEje(id);
  }
}

function collapseAll() {
  for (let id in bloques) {
    if (bloques[id].expanded) toggleEje(id);
  }
}

function toggleAutor(nombre, btn) {
  if (autoresVisibles.has(nombre)) {
    if (autoresVisibles.size === 1) return;
    autoresVisibles.delete(nombre);
    btn.classList.remove('active');
  } else {
    autoresVisibles.add(nombre);
    btn.classList.add('active');
  }
  applyVisibility();
}

function applyVisibility() {
  AUTORES.forEach(a => {
    const visible = autoresVisibles.has(a.name);
    document.querySelectorAll(`th[data-auth="${a.name}"], td[data-auth="${a.name}"]`).forEach(el => {
      el.style.display = visible ? '' : 'none';
    });
  });

  const epocas = ['antigua', 'medieval', 'moderna', 'contemp'];
  epocas.forEach(ep => {
    const th = document.querySelector(`.th-epoca[data-ep="${ep}"]`);
    const count = AUTORES.filter(a => a.epoca === ep && autoresVisibles.has(a.name)).length;
    if (count === 0) {
      th.style.display = 'none';
    } else {
      th.style.display = '';
      th.colSpan = count;
    }
  });

  const totalCols = 1 + autoresVisibles.size;
  document.querySelectorAll('.row-eje td').forEach(td => {
    td.colSpan = totalCols;
  });
}

fetch(URL).then(r => r.text()).then(raw => {
  const data = JSON.parse(raw.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
  buildTable(data);
});
</script>
</body>
</html>
