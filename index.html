<script>
const SHEET_ID = '1XK6qxbjGrQYjW8nvlmxONOSekHCz38Y6MEHmbD_m5JU';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Tabla%20comparativa`;

const COLS = [
  { idx: 0, label: 'EJE / CONCEPTO', epoca: 'concepto',  thEpoca: '',                  thAutor: '',              bgClass: '',          princClass: 'td-concepto-princ' },
  { idx: 1, label: 'PLATÓN',         epoca: 'antigua',   thEpoca: 'th-bg-antigua',     thAutor: 'th-bg-antigua', bgClass: 'bg-antigua', princClass: 'princ-antigua' },
  { idx: 2, label: 'TOMÁS DE AQUINO',epoca: 'medieval',  thEpoca: 'th-bg-medieval',    thAutor: 'th-bg-medieval',bgClass: 'bg-medieval',princClass: 'princ-medieval' },
  { idx: 3, label: 'DESCARTES',      epoca: 'moderna',   thEpoca: 'th-bg-moderna',     thAutor: 'th-bg-moderna', bgClass: 'bg-moderna', princClass: 'princ-moderna' },
  { idx: 4, label: 'LOCKE',          epoca: 'moderna',   thEpoca: 'th-bg-moderna',     thAutor: 'th-bg-moderna', bgClass: 'bg-moderna', princClass: 'princ-moderna' },
  { idx: 5, label: 'MARX',           epoca: 'contemp',   thEpoca: 'th-bg-contemp',     thAutor: 'th-bg-contemp', bgClass: 'bg-marx',    princClass: 'princ-contemp' },
  { idx: 6, label: 'ARENDT',         epoca: 'contemp',   thEpoca: 'th-bg-contemp',     thAutor: 'th-bg-contemp', bgClass: 'bg-arendt',  princClass: 'princ-contemp' },
];

const EPOCAS_LABELS = {
  antigua:  'ANTIGUA',
  medieval: 'MEDIEVAL',
  moderna:  'MODERNA',
  contemp:  'CONTEMPORÁNEA',
};

let currentEpocas = new Set(['antigua','medieval','moderna','contemp']);
let ejeGroups = {}; 
let ejeRows   = {}; 
let ejeState  = {}; 

function parseGvizJson(raw) {
  const json = raw.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, '');
  return JSON.parse(json);
}

// CORRECCIÓN: Detecta ejes si empiezan por Letra o Estrella y el resto está vacío
function detectRowType(cells) {
  const first = (cells[0] || '').trim();
  if (!first) return 'empty';
  const restEmpty = cells.slice(1).every(c => !c || c.trim() === '');
  if (restEmpty && (first.match(/^[A-Z]/i) || first.startsWith('★'))) return 'eje'; 
  if (first.startsWith('★')) return 'principio';
  return 'data';
}

function buildTable(data) {
  const rows = data.table.rows;
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // CABECERA (Fila épocas y Fila autores)
  const tr1 = document.createElement('tr');
  const thEmpty = document.createElement('th');
  thEmpty.className = 'th-epoca col-concepto';
  thEmpty.rowSpan = 2;
  tr1.appendChild(thEmpty);

  const epocaGroups = [];
  let prev = null;
  for (const col of COLS.slice(1)) {
    if (col.epoca !== prev) {
      epocaGroups.push({ epoca: col.epoca, cols: [col], thClass: col.thEpoca });
      prev = col.epoca;
    } else {
      epocaGroups[epocaGroups.length - 1].cols.push(col);
    }
  }

  for (const g of epocaGroups) {
    const th = document.createElement('th');
    th.className = `th-epoca ${g.thClass}`;
    th.colSpan = g.cols.length;
    th.textContent = EPOCAS_LABELS[g.epoca];
    th.dataset.epoca = g.epoca; // El CSS ocultará esto, pero el botón no.
    tr1.appendChild(th);
  }
  thead.appendChild(tr1);

  const tr2 = document.createElement('tr');
  for (const col of COLS.slice(1)) {
    const th = document.createElement('th');
    th.className = `th-autor col-autor ${col.thAutor}`;
    th.textContent = col.label;
    th.dataset.epoca = col.epoca;
    tr2.appendChild(th);
  }
  thead.appendChild(tr2);

  // CUERPO
  let currentEjeId = null;
  let ejeCounter = 0;

  for (const row of rows) {
    const cells = COLS.map(col => {
      const c = row.c[col.idx];
      return (c && c.v !== null) ? String(c.v) : '';
    });

    const type = detectRowType(cells);
    if (type === 'empty') continue;

    if (type === 'eje') {
      ejeCounter++;
      currentEjeId = 'eje' + ejeCounter;
      ejeGroups[currentEjeId] = [];
      ejeState[currentEjeId] = true;

      const tr = document.createElement('tr');
      tr.className = 'row-eje';
      tr.dataset.eje = currentEjeId;
      tr.onclick = () => toggleEje(currentEjeId);

      const td = document.createElement('td');
      td.colSpan = COLS.length;
      td.innerHTML = `<span class="toggle-icon">▼</span>${cells[0]}`;
      tr.appendChild(td);
      tbody.appendChild(tr);
      ejeRows[currentEjeId] = tr;
    } else {
      const tr = document.createElement('tr');
      tr.className = (type === 'principio') ? 'row-principio' : 'row-data';
      if (currentEjeId) {
        tr.dataset.parentEje = currentEjeId;
        ejeGroups[currentEjeId].push(tr);
      }

      for (const col of COLS) {
        const td = document.createElement('td');
        td.dataset.epoca = col.epoca;
        const val = cells[col.idx];
        
        if (col.idx === 0) {
          td.className = (type === 'principio') ? col.princClass : 'td-concepto';
          td.textContent = val || (type === 'principio' ? '★ PRINCIPIO' : '');
        } else {
          td.className = (type === 'principio') ? col.princClass : col.bgClass;
          if (val === '—' || val === '-' || val === '') {
            td.classList.add('na-cell');
            td.textContent = '—';
          } else {
            td.textContent = val;
          }
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('tabla').style.display = '';
  applyVisibility();
}

// Lógica de plegado corregida
function toggleEje(ejeId) {
  ejeState[ejeId] = !ejeState[ejeId];
  updateEjeUI(ejeId);
}

function updateEjeUI(ejeId) {
  const isExpanded = ejeState[ejeId];
  const mainRow = ejeRows[ejeId];
  const childRows = ejeGroups[ejeId] || [];

  mainRow.classList.toggle('collapsed', !isExpanded);
  const icon = mainRow.querySelector('.toggle-icon');
  if (icon) icon.textContent = isExpanded ? '▼' : '▶';

  childRows.forEach(row => {
    row.style.display = isExpanded ? '' : 'none';
  });
}

function expandAll() {
  Object.keys(ejeState).forEach(id => {
    ejeState[id] = true;
    updateEjeUI(id);
  });
}

function collapseAll() {
  Object.keys(ejeState).forEach(id => {
    ejeState[id] = false;
    updateEjeUI(id);
  });
}

function toggleEpoca(btn) {
  const epoca = btn.dataset.epoca;
  if (currentEpocas.has(epoca)) {
    if (currentEpocas.size === 1) return;
    currentEpocas.delete(epoca);
    btn.classList.remove('active');
  } else {
    currentEpocas.add(epoca);
    btn.classList.add('active');
  }
  applyVisibility();
}

// CORRECCIÓN CLAVE: Ahora solo oculta celdas de la TABLA, no los botones
function applyVisibility() {
  // Seleccionamos solo celdas de cabecera (th) y datos (td)
  document.querySelectorAll('th[data-epoca], td[data-epoca]').forEach(el => {
    const ep = el.dataset.epoca;
    if (ep && ep !== 'concepto') {
      const isVisible = currentEpocas.has(ep);
      el.style.display = isVisible ? '' : 'none';
    }
  });

  // Ajustar colspans de los grupos de épocas
  document.querySelectorAll('.th-epoca[data-epoca]').forEach(th => {
    const ep = th.dataset.epoca;
    if (currentEpocas.has(ep)) {
      th.style.display = '';
      const count = COLS.filter(c => c.epoca === ep).length;
      th.colSpan = count;
    } else {
      th.style.display = 'none';
    }
  });
  
  // Ajustar el ancho de las filas negras (Ejes) para que no se corten
  const visibleColsCount = COLS.filter(c => c.epoca === 'concepto' || currentEpocas.has(c.epoca)).length;
  document.querySelectorAll('.row-eje td').forEach(td => {
    td.colSpan = visibleColsCount;
  });
}

fetch(URL)
  .then(r => r.text())
  .then(raw => {
    const data = parseGvizJson(raw);
    buildTable(data);
  })
  .catch(err => {
    document.getElementById('loading').style.display = 'none';
    const em = document.getElementById('error-msg');
    em.style.display = 'block';
    em.textContent = `Error: ${err.message}`;
  });
</script>
